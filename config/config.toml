debug = false
host = "0.0.0.0"
port = 6001
mode = "production"
path_prefix = "/"
shutdown_grace_period = 2
websocket_max_payload_kb = 64
user_authentication_timeout = 3600
activity_timeout = 120

[adapter]
driver = "local"
enable_socket_counting = true

[adapter.cluster]
nodes = []
prefix = "sockudo_adapter:"
request_timeout_ms = 5000
use_connection_manager = true

[adapter.cluster_health]
enabled = true
heartbeat_interval_ms = 10000
node_timeout_ms = 30000
cleanup_interval_ms = 10000

[database]

[database.surrealdb]
url = "ws://127.0.0.1:8000"
namespace = "sockudo"
database = "sockudo"
username = "root"
password = "root"
table_name = "applications"

[app_manager]
driver = "memory"

[app_manager.array]
[[app_manager.array.apps]]
id = "app-id"
key = "app-key"
secret = "app-secret"
enabled = true

[app_manager.array.apps.policy.limits]
max_connections = 100000
max_client_events_per_second = 1000

[app_manager.array.apps.policy.features]
enable_client_messages = true
enable_user_authentication = true

[app_manager.array.apps.policy.channels]
allowed_origins = ["*"]

[[app_manager.array.apps.policy.channels.channel_namespaces]]
name = "ticker"
channel_name_pattern = "^ticker:[A-Za-z0-9._-]+$"
max_channel_name_length = 200

[[app_manager.array.apps.policy.channels.channel_namespaces]]
name = "price"
channel_name_pattern = "^price:[A-Za-z0-9._-]+$"
max_channel_name_length = 200

[[app_manager.array.apps.policy.channels.channel_namespaces]]
name = "chat"
channel_name_pattern = "^chat:[A-Za-z0-9._-]+$"
max_channel_name_length = 200
allow_user_limited_channels = true

[app_manager.array.apps.policy.idempotency]
enabled = true
ttl_seconds = 300

[app_manager.array.apps.policy.connection_recovery]
enabled = false

[app_manager.array.apps.policy.channels.channel_delta_compression."ticker:*"]
enabled = true
algorithm = "Fossil"
conflation_key = "item_id"
max_messages_per_key = 10
max_conflation_keys = 1000
enable_tags = false

[app_manager.array.apps.policy.channels.channel_delta_compression."price:*"]
enabled = true
algorithm = "Fossil"
conflation_key = "item_id"
max_messages_per_key = 10
max_conflation_keys = 100

[app_manager.cache]
enabled = false
ttl = 300

[cache]
driver = "memory"

[cache.memory]
ttl = 300
cleanup_interval = 60
max_capacity = 10000

[queue]
driver = "memory"

[rate_limiter]
enabled = false
driver = "memory"

[metrics]
enabled = true
driver = "prometheus"
host = "0.0.0.0"
port = 9601

[metrics.prometheus]
prefix = "sockudo_"

[ssl]
enabled = false

[cors]
credentials = true
origin = ["*"]
methods = ["GET", "POST", "OPTIONS"]
allowed_headers = ["Authorization", "Content-Type", "X-Requested-With", "Accept"]

[channel_limits]
max_name_length = 200
cache_ttl = 3600

[event_limits]
max_channels_at_once = 100
max_name_length = 200
max_payload_in_kb = 100
max_batch_size = 10

[presence]
max_members_per_channel = 100
max_member_size_in_kb = 2

[http_api]
request_limit_in_mb = 10

[webhooks]
request_timeout_ms = 10000

[webhooks.batching]
enabled = false

[webhooks.retry]
enabled = true
max_attempts = 5
max_elapsed_time_ms = 300000
initial_backoff_ms = 1000
max_backoff_ms = 60000

[logging]
colors_enabled = false
include_target = true

[cleanup]
async_enabled = true
fallback_to_sync = true
queue_buffer_size = 10000
batch_size = 25
batch_timeout_ms = 50
worker_threads = "auto"
max_retry_attempts = 2

[delta_compression]
enabled = true
algorithm = "Fossil"
full_message_interval = 10
min_message_size = 100
max_state_age_secs = 300
max_channel_states_per_socket = 100
cluster_coordination = true
omit_delta_algorithm = true

[tag_filtering]
enabled = true
enable_tags = false

[idempotency]
enabled = true
ttl_seconds = 120
max_key_length = 128

[ephemeral]
enabled = true

[echo_control]
enabled = true
default_echo_messages = true

[event_name_filtering]
enabled = true
max_events_per_filter = 50
max_event_name_length = 200

[connection_recovery]
enabled = false
buffer_ttl_seconds = 120
max_buffer_size = 100

[websocket]
max_messages = 1000
max_bytes = 1048576
disconnect_on_buffer_full = false
max_message_size = 67108864
max_frame_size = 16777216
write_buffer_size = 16384
max_backpressure = 1048576
auto_ping = true
ping_interval = 30
idle_timeout = 120
compression = "disabled"

# V2 Message Features:
# - extras.ephemeral: skip recovery buffer and webhooks (gated by [ephemeral])
# - extras.echo: per-message echo control override (gated by [echo_control])
# - extras.idempotency_key: message-level dedup (uses [idempotency] config above)
# - extras.headers: flat metadata for server-side filtering (set per-message)
# - echo_messages: connection-level echo control (uses [echo_control], can be overridden via ?echo_messages= query param)
# - filter.events: event name filtering (gated by [event_name_filtering], set per-subscription in subscribe data)
