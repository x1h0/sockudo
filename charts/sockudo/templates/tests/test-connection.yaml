apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "sockudo.fullname" . }}-test-connection"
  labels:
    {{- include "sockudo.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "sockudo.fullname" . }}:{{ .Values.service.port }}/up', '-q', '-O', '-']
  restartPolicy: Never
