name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm after release PR is merged
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    name: Changesets release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.17.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Release candidate checks
        run: pnpm release:check

      - name: Dry-run release package
        run: pnpm release:dry-run

      - name: Create release PR
        if: inputs.publish == 'false'
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm changeset version
          commit: "Prepare @sockudo/ai-transport 0.1.0"
          title: "Prepare @sockudo/ai-transport 0.1.0"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm with provenance
        if: inputs.publish == 'true'
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: npm publish --access public --provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload CDN-ready UMD artifacts
        if: inputs.publish == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sockudo-ai-transport-umd
          path: |
            dist/**/*.umd.cjs
            dist/**/*.js

      - name: Tag and create GitHub release
        if: inputs.publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" --generate-notes --title "@sockudo/ai-transport v${VERSION}" dist/**/*.umd.cjs
