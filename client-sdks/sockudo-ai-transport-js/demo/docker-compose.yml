services:
  sockudo:
    build:
      context: ../../sockudo
    environment:
      SOCKUDO_DEFAULT_APP_ID: demo-app
      SOCKUDO_DEFAULT_APP_KEY: demo-key
      SOCKUDO_DEFAULT_APP_SECRET: demo-secret
      SOCKUDO_HOST: 0.0.0.0
      SOCKUDO_PORT: 6001
      SOCKUDO_PROTOCOL_VERSION: "2"
    ports:
      - "6001:6001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:6001/up/demo-app"]
      interval: 5s
      timeout: 5s
      retries: 30

  nextjs-usechat:
    image: node:22-bookworm
    working_dir: /workspace
    depends_on:
      sockudo:
        condition: service_healthy
    environment:
      SOCKUDO_APP_ID: demo-app
      SOCKUDO_APP_KEY: demo-key
      SOCKUDO_APP_SECRET: demo-secret
      SOCKUDO_HOST: sockudo
      SOCKUDO_PORT: 6001
      SOCKUDO_CHANNEL_NAME: private-ai-usechat
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-}
      VERCEL_API_KEY: ${VERCEL_API_KEY:-}
    volumes:
      - ..:/workspace
    command: >
      sh -lc "corepack enable && pnpm install && pnpm build && pnpm --filter
      @sockudo/ai-transport-demo-nextjs-usechat dev"
    ports:
      - "5174:5174"

  nextjs-core-sdk:
    image: node:22-bookworm
    working_dir: /workspace
    depends_on:
      sockudo:
        condition: service_healthy
    environment:
      SOCKUDO_APP_ID: demo-app
      SOCKUDO_APP_KEY: demo-key
      SOCKUDO_APP_SECRET: demo-secret
      SOCKUDO_HOST: sockudo
      SOCKUDO_PORT: 6001
      SOCKUDO_CHANNEL_NAME: private-ai-core
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-}
      VERCEL_API_KEY: ${VERCEL_API_KEY:-}
    volumes:
      - ..:/workspace
    command: >
      sh -lc "corepack enable && pnpm install && pnpm build && pnpm --filter
      @sockudo/ai-transport-demo-nextjs-core-sdk dev"
    ports:
      - "5175:5175"

  node-agent:
    image: node:22-bookworm
    working_dir: /workspace
    depends_on:
      sockudo:
        condition: service_healthy
    environment:
      SOCKUDO_APP_KEY: demo-key
      SOCKUDO_HOST: sockudo
      SOCKUDO_PORT: 6001
      SOCKUDO_CHANNEL_NAME: private-ai-node-agent
      PORT: 5180
    volumes:
      - ..:/workspace
    command: >
      sh -lc "corepack enable && pnpm install && pnpm build && pnpm --filter
      @sockudo/ai-transport-demo-node-agent dev"
    ports:
      - "5180:5180"
