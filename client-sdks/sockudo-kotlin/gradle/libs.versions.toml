[versions]
coroutines = "1.10.2"
junit-jupiter = "5.12.2"
kotlin = "2.1.20"
kotlinx-serialization = "1.8.1"
msgpack = "0.9.8"
okhttp = "4.12.0"
okio = "3.10.2"
protobuf = "4.31.1"
slf4j = "2.0.17"
tweetnacl = "1.1.2"
vcdiff = "0.1.1"

[libraries]
coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutines" }
coroutines-test = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version.ref = "coroutines" }
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junit-jupiter" }
kotlin-test = { module = "org.jetbrains.kotlin:kotlin-test" }
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "kotlinx-serialization" }
msgpack-core = { module = "org.msgpack:msgpack-core", version.ref = "msgpack" }
okhttp = { module = "com.squareup.okhttp3:okhttp", version.ref = "okhttp" }
okhttp-mockwebserver = { module = "com.squareup.okhttp3:mockwebserver", version.ref = "okhttp" }
okhttp-sse = { module = "com.squareup.okhttp3:okhttp-sse", version.ref = "okhttp" }
okio = { module = "com.squareup.okio:okio", version.ref = "okio" }
protobuf-java = { module = "com.google.protobuf:protobuf-java", version.ref = "protobuf" }
slf4j-nop = { module = "org.slf4j:slf4j-nop", version.ref = "slf4j" }
tweetnacl = { module = "org.purejava:tweetnacl-java", version.ref = "tweetnacl" }
vcdiff = { module = "com.davidehrmann.vcdiff:vcdiff-core", version.ref = "vcdiff" }

[plugins]
