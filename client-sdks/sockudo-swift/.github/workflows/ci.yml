name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: sockudo-swift-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"
      - run: swift build
      - run: swift test
