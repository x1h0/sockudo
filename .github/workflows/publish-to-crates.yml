name: Publish to Crates.io Manually

on: workflow_dispatch

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io

jobs:
  # =============================================================================
  # Publish to Crates.io
  # =============================================================================
  publish-crates:
    name: Publish to Crates.io
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libpq-dev libmariadb-dev cmake protobuf-compiler libprotobuf-dev

      - name: Publish workspace crates to crates.io
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        if: env.CRATES_IO_TOKEN != ''
        run: |
          # Publish crates in dependency order, skipping already-published ones.
          CRATES=(
            sockudo-protocol
            sockudo-filter
            sockudo-core
            sockudo-app
            sockudo-cache
            sockudo-queue
            sockudo-metrics
            sockudo-rate-limiter
            sockudo-webhook
            sockudo-delta
            sockudo-ai-transport
            sockudo-push
            sockudo-adapter
            sockudo
          )

          FAILED_CRATES=()

          for crate in "${CRATES[@]}"; do
            echo "::group::Publishing $crate"
            VERSION=$(cargo metadata --no-deps --format-version 1 \
              | jq -r ".packages[] | select(.name == \"$crate\") | .version")

            # Check if this version already exists on crates.io
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/$crate/$VERSION")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "$crate@$VERSION already published, skipping."
            else
              echo "Publishing $crate@$VERSION..."
              cargo publish -p "$crate" --token "$CRATES_IO_TOKEN" || {
                echo "::warning::Failed to publish $crate@$VERSION (will retry)"
                FAILED_CRATES+=("$crate")
              }
              # Wait for crates.io index to propagate
              sleep 30
            fi
            echo "::endgroup::"
          done

          # Retry failed crates once (index may have propagated by now)
          if [ ${#FAILED_CRATES[@]} -gt 0 ]; then
            echo "Retrying ${#FAILED_CRATES[@]} failed crate(s) after index propagation delay..."
            sleep 30
            for crate in "${FAILED_CRATES[@]}"; do
              echo "::group::Retrying $crate"
              VERSION=$(cargo metadata --no-deps --format-version 1 \
                | jq -r ".packages[] | select(.name == \"$crate\") | .version")
              echo "Retrying $crate@$VERSION..."
              cargo publish -p "$crate" --token "$CRATES_IO_TOKEN" || {
                echo "::error::Failed to publish $crate@$VERSION after retry"
              }
              sleep 30
              echo "::endgroup::"
            done
          fi
