name: Publish to Crates.io Manually

on:
  workflow_dispatch

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io

jobs:
  # =============================================================================
  # Publish to Crates.io
  # =============================================================================
  publish-crates:
    name: Publish to Crates.io
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libpq-dev libmariadb-dev cmake

      - name: Publish workspace crates to crates.io
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        if: env.CRATES_IO_TOKEN != ''
        run: |
          # Publish crates in dependency order, skipping already-published ones.
          CRATES=(
            sockudo-protocol
            sockudo-filter
            sockudo-core
            sockudo-app
            sockudo-cache
            sockudo-queue
            sockudo-rate-limiter
            sockudo-metrics
            sockudo-webhook
            sockudo-delta
            sockudo-adapter
            sockudo-server
          )

          for crate in "${CRATES[@]}"; do
            echo "::group::Publishing $crate"
            VERSION=$(cargo metadata --no-deps --format-version 1 \
              | jq -r ".packages[] | select(.name == \"$crate\") | .version")

            # Check if this version already exists on crates.io
            if cargo search "$crate" --limit 1 2>/dev/null | grep -q "\"$VERSION\""; then
              echo "$crate@$VERSION already published, skipping."
            else
              echo "Publishing $crate@$VERSION..."
              cargo publish -p "$crate" --token "$CRATES_IO_TOKEN" || {
                echo "::warning::Failed to publish $crate@$VERSION"
              }
              # Wait a bit to avoid rate limits
              sleep 15
            fi
            echo "::endgroup::"
          done
