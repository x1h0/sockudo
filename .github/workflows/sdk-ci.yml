name: SDK CI

on:
  workflow_dispatch: {}
  pull_request:
    branches: [main, master, develop, beta]
    paths:
      - ".github/workflows/sdk-ci.yml"
      - ".github/workflows/sdk-release.yml"
      - "client-sdks/**"
      - "server-sdks/**"
  push:
    branches: [main, master, develop, beta]
    paths:
      - ".github/workflows/sdk-ci.yml"
      - ".github/workflows/sdk-release.yml"
      - "client-sdks/**"
      - "server-sdks/**"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sdk-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.13"

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install yamllint
        run: python -m pip install --upgrade yamllint

      - name: Lint SDK workflows
        run: >
          yamllint
          -d "{extends: default, rules: {line-length: disable, truthy: disable}}"
          .github/workflows/sdk-ci.yml
          .github/workflows/sdk-release.yml

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  node-sdks:
    name: Node SDKs / ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "@sockudo/client"
            path: client-sdks/sockudo-js
            manager: bun
            install: bun install --frozen-lockfile
            verify: |
              bun run format:check
              bun run typecheck
              bun run lint
              bun run test
              bun run build:all
              npm pack --dry-run
          - name: "@sockudo/ai-transport"
            path: client-sdks/sockudo-ai-transport-js
            manager: pnpm
            install: pnpm install --frozen-lockfile
            verify: |
              pnpm format:check
              pnpm lint
              pnpm typecheck
              (cd ../sockudo-js && bun run build:web)
              pnpm test
              pnpm build
              pnpm smoke:exports
              npm pack --dry-run
          - name: "sockudo"
            path: server-sdks/sockudo-http-node
            manager: npm
            install: npm ci
            verify: |
              npm run format:check
              npm run lint
              npm run typecheck
              npm run local-test
              npm pack --dry-run
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node for npm
        if: matrix.manager == 'npm'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Set up pnpm
        if: matrix.manager == 'pnpm'
        uses: pnpm/action-setup@v6
        with:
          version: 10.17.0
          run_install: false

      - name: Set up Node for pnpm
        if: matrix.manager == 'pnpm'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ${{ matrix.path }}/pnpm-lock.yaml

      - name: Set up Node for Bun
        if: matrix.manager == 'bun'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Bun
        if: matrix.manager == 'bun' || matrix.name == '@sockudo/ai-transport'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install latest npm CLI
        run: npm install --global npm@latest

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: ${{ matrix.install }}

      - name: Verify package
        working-directory: ${{ matrix.path }}
        run: ${{ matrix.verify }}

  python-sdks:
    name: Python SDKs / ${{ matrix.name }} / py${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: sockudo-python
            path: client-sdks/sockudo-python
            python-version: "3.10"
          - name: sockudo-python
            path: client-sdks/sockudo-python
            python-version: "3.13"
          - name: sockudo-http-python
            path: server-sdks/sockudo-http-python
            python-version: "3.10"
          - name: sockudo-http-python
            path: server-sdks/sockudo-http-python
            python-version: "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: ${{ matrix.path }}/pyproject.toml

      - name: Install package and tooling
        working-directory: ${{ matrix.path }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade ".[dev]"

      - name: Format, lint, test, and build
        working-directory: ${{ matrix.path }}
        run: |
          ruff format --check .
          ruff check .
          pytest
          python -m build
          twine check dist/*

  flutter-client-sdk:
    name: Flutter Client SDK
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: client-sdks/sockudo-flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verify Flutter package
        run: |
          flutter pub get
          dart format --output=none --set-exit-if-changed .
          flutter analyze
          flutter test
          flutter pub publish --dry-run

  dotnet-sdks:
    name: .NET SDKs / ${{ matrix.name }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Sockudo.Client
            kind: client
            root: client-sdks/sockudo-dotnet
            os: ubuntu-24.04
          - name: Sockudo.Client
            kind: client
            root: client-sdks/sockudo-dotnet
            os: macos-15
          - name: Sockudo.Client
            kind: client
            root: client-sdks/sockudo-dotnet
            os: windows-2025
          - name: SockudoServer and PusherServer
            kind: server
            root: server-sdks/sockudo-http-dotnet
            os: ubuntu-24.04
          - name: SockudoServer and PusherServer
            kind: server
            root: server-sdks/sockudo-http-dotnet
            os: macos-15
          - name: SockudoServer and PusherServer
            kind: server
            root: server-sdks/sockudo-http-dotnet
            os: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Verify client package
        if: matrix.kind == 'client'
        working-directory: ${{ matrix.root }}
        run: |
          dotnet restore tests/Sockudo.Client.Tests/Sockudo.Client.Tests.csproj
          dotnet format src/Sockudo.Client/Sockudo.Client.csproj --verify-no-changes --no-restore
          dotnet build tests/Sockudo.Client.Tests/Sockudo.Client.Tests.csproj --configuration Release --no-restore
          dotnet test tests/Sockudo.Client.Tests/Sockudo.Client.Tests.csproj --configuration Release --no-build --verbosity normal
          dotnet pack src/Sockudo.Client/Sockudo.Client.csproj --configuration Release --no-build --output artifacts

      - name: Verify server packages
        if: matrix.kind == 'server'
        working-directory: ${{ matrix.root }}
        env:
          PUSHER_APP_ID: test-app-id
          PUSHER_APP_KEY: test-app-key
          PUSHER_APP_SECRET: test-app-secret
          PUSHER_APP_CLUSTER: mt1
        run: |
          dotnet restore sockudo-dotnet-server.sln
          dotnet restore pusher-dotnet-server.sln
          dotnet format sockudo-dotnet-server.sln --verify-no-changes --no-restore
          dotnet format pusher-dotnet-server.sln --verify-no-changes --no-restore
          dotnet build sockudo-dotnet-server.sln --configuration Release --no-restore
          dotnet test sockudo-dotnet-server.sln --configuration Release --no-build --verbosity normal
          dotnet build pusher-dotnet-server.sln --configuration Release --no-restore
          dotnet test pusher-dotnet-server.sln --configuration Release --no-build --verbosity normal
          dotnet pack SockudoServer/SockudoServer.csproj --configuration Release --no-build --output artifacts
          dotnet pack PusherServer/PusherServer.csproj --configuration Release --no-build --output artifacts

  jvm-sdks:
    name: JVM SDKs / ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: sockudo-kotlin
            path: client-sdks/sockudo-kotlin
            java: "23"
            command: ./gradlew --no-daemon :lib:check :lib:publishToMavenLocal
          - name: sockudo-http-java
            path: server-sdks/sockudo-http-java
            java: "21"
            command: ./gradlew --no-daemon check publishToMavenLocal
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Verify package
        working-directory: ${{ matrix.path }}
        run: ${{ matrix.command }}

  swift-sdks:
    name: Swift SDKs / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: SockudoSwift
            path: client-sdks/sockudo-swift
            os: macos-26
          - name: Sockudo HTTP Swift
            path: server-sdks/sockudo-http-swift
            os: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Verify Swift package
        working-directory: ${{ matrix.path }}
        run: |
          swift package resolve
          swift build
          swift test
          swift package dump-package > /tmp/package.json
          swiftlint lint --lenient Sources
          swiftlint lint --lenient Tests

  php-server-sdk:
    name: PHP Server SDK
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: server-sdks/sockudo-http-php
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
          extensions: curl, json, sodium

      - name: Verify PHP package
        run: |
          composer validate --strict "$GITHUB_WORKSPACE/composer.json"
          composer validate --strict
          composer install --no-interaction --prefer-dist
          vendor/bin/php-cs-fixer fix --dry-run --diff --using-cache=no
          vendor/bin/phplint
          vendor/bin/phpunit

  ruby-server-sdk:
    name: Ruby Server SDK
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: server-sdks/sockudo-http-ruby
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: server-sdks/sockudo-http-ruby

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libsodium-dev

      - name: Verify Ruby package
        run: |
          bundle exec rubocop --format progress
          bundle exec rake spec
          gem build sockudo.gemspec

  go-server-sdk:
    name: Go Server SDK
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: server-sdks/sockudo-http-go
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server-sdks/sockudo-http-go/go.mod
          cache-dependency-path: server-sdks/sockudo-http-go/go.sum

      - name: Verify Go package
        run: |
          test -z "$(gofmt -l .)"
          go vet ./...
          go test ./...
          go list -m all

  rust-server-sdk:
    name: Rust Server SDK
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: server-sdks/sockudo-http-rust
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Verify Rust package
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-features
          cargo package --allow-dirty --no-verify
