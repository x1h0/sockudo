name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: sockudo-http-swift-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint with SwiftLint
        run: |
          brew install swiftlint
          swiftlint --strict

  build-and-test:
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -v

      - name: Run tests
        run: swift test -v
