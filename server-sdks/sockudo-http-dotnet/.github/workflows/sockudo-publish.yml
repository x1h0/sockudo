name: Sockudo Publish to NuGet

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    # Pack on Windows to include all target frameworks in the nupkg
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore and build
        run: dotnet build sockudo-dotnet-server.sln --configuration Release

      - name: Pack
        run: dotnet pack SockudoServer/SockudoServer.csproj --no-build --configuration Release --output ./nupkg

      - name: Publish to NuGet
        shell: bash
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
