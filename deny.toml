[graph]
all-features = false
features = [
    "sockudo/ai-transport",
    "sockudo/push",
    "sockudo/push-fcm",
    "sockudo/push-apns",
    "sockudo/push-webpush",
    "sockudo/mysql",
    "sockudo/postgres",
]

[advisories]
ignore = []

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "allow"
wildcards = "allow"
deny = [
    { crate = "rsa", reason = "RUSTSEC-2023-0071: RSA timing side-channel risk; JWT signing must use the AWS-LC backend instead" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
