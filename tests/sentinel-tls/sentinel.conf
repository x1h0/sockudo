# Redis Sentinel config for the local TLS test fixture.
#
# Copied to a writable path by the container entrypoint because Sentinel rewrites
# its own config at runtime. The master is monitored via `host.docker.internal` so
# that the address Sentinel hands back to a host-run client is reachable from the
# host (add `127.0.0.1 host.docker.internal` to /etc/hosts if your platform does
# not already resolve it).

port 0
tls-port 26379
tls-cert-file /certs/redis.crt
tls-key-file /certs/redis.key
tls-ca-cert-file /certs/ca.crt
tls-replication yes

sentinel resolve-hostnames yes
sentinel announce-hostnames yes

sentinel monitor mymaster host.docker.internal 16380 2
sentinel auth-pass mymaster masterpass
sentinel down-after-milliseconds mymaster 5000
sentinel failover-timeout mymaster 10000
